name: Build and Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install AutoHotkey v2
        shell: pwsh
        run: |
          Invoke-WebRequest -Uri "https://www.autohotkey.com/download/ahk-v2.exe" -OutFile "ahk-setup.exe"
          Start-Process -FilePath ".\ahk-setup.exe" -ArgumentList "/VERYSILENT", "/SUPPRESSMSGBOXES", "/NORESTART" -Wait

      - name: Install Ahk2Exe compiler
        shell: pwsh
        run: |
          $release = Invoke-RestMethod -Uri "https://api.github.com/repos/AutoHotkey/Ahk2Exe/releases/latest"
          $asset = $release.assets | Where-Object { $_.name -like "*.zip" } | Select-Object -First 1
          Invoke-WebRequest -Uri $asset.browser_download_url -OutFile "Ahk2Exe.zip"
          Expand-Archive -Path "Ahk2Exe.zip" -DestinationPath "Ahk2Exe" -Force

      - name: Compile LangWidget.ahk to .exe
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path build | Out-Null
          $ahk2exe = (Get-ChildItem -Path "Ahk2Exe" -Filter "Ahk2Exe.exe" -Recurse | Select-Object -First 1).FullName
          $base = "$env:ProgramFiles\AutoHotkey\v2\AutoHotkey64.exe"
          & $ahk2exe /in src\LangWidget.ahk /out build\LangWidget.exe /base $base /silent verbose

      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: build/LangWidget.exe
